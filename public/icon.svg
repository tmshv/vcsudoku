<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#344861"/>

  <!-- 3x3 grid of cells -->
  <!-- Row 1 -->
  <rect x="60"  y="60"  width="118" height="118" rx="14" fill="#4a6480"/>
  <rect x="197" y="60"  width="118" height="118" rx="14" fill="#4a6480"/>
  <rect x="334" y="60"  width="118" height="118" rx="14" fill="#4a6480"/>

  <!-- Row 2 -->
  <rect x="60"  y="197" width="118" height="118" rx="14" fill="#4a6480"/>
  <rect x="197" y="197" width="118" height="118" rx="14" fill="#2a3e55"/>
  <rect x="334" y="197" width="118" height="118" rx="14" fill="#4a6480"/>

  <!-- Row 3 -->
  <rect x="60"  y="334" width="118" height="118" rx="14" fill="#4a6480"/>
  <rect x="197" y="334" width="118" height="118" rx="14" fill="#4a6480"/>
  <rect x="334" y="334" width="118" height="118" rx="14" fill="#4a6480"/>

  <!-- Digit glyphs -->
  <text x="119" y="143" font-family="system-ui,sans-serif" font-weight="700" font-size="72" fill="white" text-anchor="middle">5</text>
  <text x="393" y="143" font-family="system-ui,sans-serif" font-weight="700" font-size="72" fill="rgba(255,255,255,0.5)" text-anchor="middle">3</text>
  <text x="256" y="280" font-family="system-ui,sans-serif" font-weight="700" font-size="72" fill="#f0c040" text-anchor="middle">7</text>
  <text x="119" y="417" font-family="system-ui,sans-serif" font-weight="700" font-size="72" fill="rgba(255,255,255,0.5)" text-anchor="middle">9</text>
  <text x="393" y="417" font-family="system-ui,sans-serif" font-weight="700" font-size="72" fill="white" text-anchor="middle">1</text>
</svg>
